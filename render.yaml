# إعداد نشر السيرفر على Render تلقائياً (Blueprint)
# اربط مستودع GitHub بـ Render واختر "New Blueprint" فيقرأ هذا الملف.
services:
  - type: web
    name: voice-room-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      # مفاتيح LiveKit (الصوت) — تُضبط من لوحة Render (Environment) لا من هنا (سرّية)
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
